<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABS-THAILAND Cloud Storage</title>
  <meta name="description" content="ABS-THAILAND Cloud Storage — secure file access powered by Synology Drive." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { brand: { DEFAULT: '#C8102E', dark: '#8f0a20' } },
        },
      },
    };
  </script>
</head>
<body class="font-sans text-slate-900 antialiased">

  <main class="relative min-h-screen flex items-center overflow-hidden">

    <!-- Background: Phang Nga bay aerial (original, no overlay / no dimming) -->
    <img src="phangnga_b.jpg"
         alt="Phang Nga bay, Thailand" class="absolute inset-0 w-full h-full object-cover" />

    <!-- Content -->
    <div class="relative w-full max-w-6xl mx-auto px-6 py-16
                grid lg:grid-cols-2 gap-12 items-center">

      <!-- Brand text (left) -->
      <div class="text-white text-center lg:text-left">
        <div class="inline-block bg-white rounded-lg px-4 py-2.5 shadow-xl mb-6">
          <img src="sharp-logo.svg" alt="Sharp" class="h-6 sm:h-7 w-auto" />
        </div>
        <h1 class="text-4xl sm:text-5xl xl:text-6xl font-extrabold tracking-tight drop-shadow-lg">
          ABS-THAILAND
        </h1>
        <p class="mt-4 text-base sm:text-lg text-slate-100 drop-shadow">
          Welcome to ABS-THAILAND Cloud Storage
        </p>
      </div>

      <!-- Glassmorphism card (right) — dark tint for readability on bright sky -->
      <div class="justify-self-center lg:justify-self-end w-full max-w-md">
        <div class="relative rounded-3xl p-8 sm:p-10
                    bg-slate-900/35 backdrop-blur-2xl
                    border border-white/15 shadow-2xl
                    ring-1 ring-white/10">
          <!-- soft top highlight -->
          <div class="absolute inset-x-8 top-0 h-px bg-gradient-to-r from-transparent via-white/40 to-transparent"></div>

          <!-- icon -->
          <div class="w-12 h-12 rounded-xl bg-brand flex items-center justify-center shadow-lg shadow-brand/30 mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" />
            </svg>
          </div>

          <!-- heading -->
          <h2 class="text-2xl font-bold text-white">Cloud Storage</h2>
          <p class="mt-3 text-sm text-white/80 leading-relaxed">
            Access your files securely, anywhere and on any device.
          </p>

          <!-- button -->
          <a href="#"
             class="group mt-8 w-full inline-flex items-center justify-between gap-3 pl-6 pr-2 py-2 bg-white text-brand font-semibold rounded-xl shadow-lg hover:bg-slate-100 transition-all">
            <span>Enter Cloud Storage</span>
            <span class="w-10 h-10 rounded-lg bg-brand text-white flex items-center justify-center group-hover:translate-x-0.5 transition-transform">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
              </svg>
            </span>
          </a>
        </div>

        <!-- footer under card -->
        <p class="mt-6 text-center text-xs text-white/80 drop-shadow">© 2026 ABS-THAILAND · Powered by Synology Drive</p>
      </div>

    </div>
  </main>

</body>
</html>
