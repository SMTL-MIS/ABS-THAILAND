<!DOCTYPE html>
<html lang="en">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { brand: { DEFAULT: '#C8102E', dark: '#8f0a20' } },
        },
      },
    };
  </script>
</head>
<body class="font-sans bg-white text-slate-900 antialiased">

  <main class="min-h-screen flex flex-col items-center justify-center px-6 text-center">

    <!-- Logo mark -->
    <div class="w-16 h-16 rounded-2xl bg-brand flex items-center justify-center shadow-lg mb-8">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-9 h-9 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" />
      </svg>
    </div>

    <!-- Title -->
    <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight">
      ABS-THAILAND
    </h1>
    <p class="mt-1 text-base sm:text-lg font-medium text-slate-400 tracking-widest uppercase">
      Cloud Storage
    </p>

    <!-- Button -->
    <a href="https://absthailand-sharp.com/" target="_blank" rel="noopener noreferrer"
       class="mt-12 inline-flex items-center gap-2.5 px-8 py-4 bg-brand text-white text-base font-semibold rounded-xl shadow-lg shadow-brand/25 hover:bg-brand-dark hover:shadow-xl transition-all">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
      </svg>
      Enter Synology Drive

  </main>

  <!-- Minimal footer -->
  <footer class="fixed bottom-0 inset-x-0 py-5 text-center">
    <p class="text-xs text-slate-400">© 2026 ABS-THAILAND</p>
  </footer>

</body>
</html>
